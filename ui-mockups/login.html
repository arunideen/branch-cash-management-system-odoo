<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Branch Cash Management (Odoo 19 CE)</title>
  <link rel="stylesheet" href="assets/odoo.css">
  <style>
    body{background:#f4f2f4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .lg-card{background:#fff;border:1px solid var(--o-border-2);border-radius:10px;box-shadow:0 6px 30px rgba(0,0,0,.10);width:100%;max-width:360px;padding:26px 28px}
    .lg-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:16px}
    .lg-logo .m{width:40px;height:40px;border-radius:9px;background:var(--o-primary);color:#fff;display:grid;place-items:center;font-weight:700;font-size:20px}
    .lg-logo b{font-size:17px;color:var(--o-text-strong)}
    .lg-db{display:flex;align-items:center;gap:6px;justify-content:center;font-size:12px;color:var(--o-muted);margin-bottom:18px}
    .lg-db svg{width:13px;height:13px}
    .lg-field{margin-bottom:14px}
    .lg-field label{display:block;font-size:12px;color:var(--o-label);font-weight:600;margin-bottom:5px}
    .lg-field input{width:100%;border:1px solid var(--o-border);border-radius:5px;padding:9px 10px;font-size:14px;color:var(--o-text)}
    .lg-field input:focus{outline:0;border-color:var(--o-primary);box-shadow:0 0 0 2px var(--o-primary-light)}
    .lg-btn{width:100%;background:var(--o-primary);color:#fff;border:0;border-radius:5px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
    .lg-btn:hover{background:var(--o-primary-dark)}
    .lg-links{display:flex;justify-content:space-between;margin-top:14px;font-size:12px}
    .lg-foot{margin-top:22px;color:#9aa0a6;font-size:12px;text-align:center}
    .lg-foot b{color:var(--o-primary)}
  </style>
</head>
<body>
  <div class="lg-card">
    <div class="lg-logo"><div class="m">₹</div><b>Branch&nbsp;Cash</b></div>
    <div class="lg-db" data-svg="db">&nbsp;Database: <b style="color:var(--o-text)">&nbsp;prabal-bcms</b></div>
    <form onsubmit="event.preventDefault();location.href='dashboard.html'">
      <div class="lg-field"><label>Email</label><input type="email" value="priya.nair@prabalmotors.in" autocomplete="username"></div>
      <div class="lg-field"><label>Password</label><input type="password" value="············" autocomplete="current-password"></div>
      <button class="lg-btn" type="submit">Log in</button>
      <div class="lg-links"><a href="#">Reset Password</a><span class="muted">2FA enabled</span></div>
    </form>
    <div class="lg-foot">Powered by <b>Odoo</b> 19 Community Edition · <a href="#">Manage Databases</a></div>
  </div>
  <p style="color:#9aa0a6;font-size:12px;margin-top:18px">Branch Cash Management System · Prabal Motors Pvt. Ltd. · <a href="index.html">mockup index</a></p>
  <script src="assets/odoo.js"></script>
</body>
</html>
